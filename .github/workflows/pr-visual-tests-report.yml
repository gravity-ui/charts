name: PR Visual Tests Report

on:
  workflow_run:
    workflows: ['PR Visual Tests']
    types:
      - completed

jobs:
  comment:
    name: Create GitHub Comment
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GRAVITY_UI_APP_ID }}
          private-key: ${{ secrets.GRAVITY_UI_APP_PRIVATE_KEY }}
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Extract PR Number
        id: pr
        run: echo "::set-output name=id::$(<pr/pr-id.txt)"
        shell: bash
      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1
        with:
          version: 2.22.35
          arch: amd64
      - name: Upload to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.STORYBOOK_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.STORYBOOK_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ru-central1
          AWS_EC2_METADATA_DISABLED: true
          PR_ID: ${{ steps.pr.outputs.id }}
          S3_BASE: s3://playwright-reports/charts/pulls
        run: |
          aws s3 cp playwright-report "${S3_BASE}/${PR_ID}/" --endpoint-url=https://storage.yandexcloud.net --recursive
          if [ -d playwright-report-perf ]; then
            aws s3 cp playwright-report-perf "${S3_BASE}/${PR_ID}/perf/" --endpoint-url=https://storage.yandexcloud.net --recursive
          fi
          for v in 17 19; do
            if [ -d "playwright-report-react${v}" ]; then
              aws s3 cp "playwright-report-react${v}" "${S3_BASE}/${PR_ID}/react${v}/" --endpoint-url=https://storage.yandexcloud.net --recursive
            fi
            if [ -d "playwright-report-perf-react${v}" ]; then
              aws s3 cp "playwright-report-perf-react${v}" "${S3_BASE}/${PR_ID}/react${v}/perf/" --endpoint-url=https://storage.yandexcloud.net --recursive
            fi
          done
        shell: bash
      - name: Build Comment Body
        id: comment_body
        env:
          PR_ID: ${{ steps.pr.outputs.id }}
          BASE_URL: https://storage.yandexcloud.net/playwright-reports/charts/pulls
        run: |
          {
            echo 'message<<COMMENT_EOF'
            echo "[Visual Tests Report](${BASE_URL}/${PR_ID}/index.html) is ready."
            echo "[Performance Tests Report](${BASE_URL}/${PR_ID}/perf/index.html) is ready."
            for v in 17 19; do
              if [ -d "playwright-report-react${v}" ] || [ -d "playwright-report-perf-react${v}" ]; then
                printf '\nReact %s: ' "${v}"
                [ -d "playwright-report-react${v}" ] && printf '[visual](%s/%s/react%s/index.html)' "${BASE_URL}" "${PR_ID}" "${v}"
                [ -d "playwright-report-react${v}" ] && [ -d "playwright-report-perf-react${v}" ] && printf ' · '
                [ -d "playwright-report-perf-react${v}" ] && printf '[perf](%s/%s/react%s/perf/index.html)' "${BASE_URL}" "${PR_ID}" "${v}"
                printf '\n'
              fi
            done
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Create Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          number: ${{ steps.pr.outputs.id }}
          header: visual tests report
          message: ${{ steps.comment_body.outputs.message }}
